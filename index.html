<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Livro-Caixa · Planejador Financeiro Semanal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root{
    --paper:#F7F4ED;
    --paper-soft:#EFEAE0;
    --ink:#20302A;
    --ink-soft:#5B6B62;
    --accent:#2F6F4F;
    --accent-dark:#234F38;
    --accent-soft:#DCE8DE;
    --gold:#C9A04A;
    --red:#B4533C;
    --line:#D9D4C8;
    --card:#FFFFFF;
    --shadow: 0 1px 2px rgba(32,48,42,0.06), 0 4px 14px rgba(32,48,42,0.05);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Inter',sans-serif;
    background:var(--paper);
    color:var(--ink);
    line-height:1.45;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,h4{
    font-family:'Fraunces',serif;
    color:var(--ink);
    margin:0;
    letter-spacing:-0.01em;
  }
  .mono{ font-family:'IBM Plex Mono',monospace; font-variant-numeric: tabular-nums; }
  a{color:var(--accent-dark);}

  /* ---------- Layout ---------- */
  .app{
    display:grid;
    grid-template-columns: 220px 1fr;
    min-height:100vh;
  }
  header.top{
    grid-column: 1 / -1;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:12px;
    padding:22px 28px;
    border-bottom:1px solid var(--line);
    background:var(--paper);
  }
  header.top .brand{
    display:flex;
    align-items:baseline;
    gap:14px;
  }
  header.top h1{ font-size:1.6rem; font-weight:600; }
  header.top .tagline{
    font-size:0.8rem;
    color:var(--ink-soft);
    font-family:'IBM Plex Mono',monospace;
    letter-spacing:0.04em;
    text-transform:uppercase;
  }
  .year-control{
    display:flex; align-items:center; gap:8px;
    font-family:'IBM Plex Mono',monospace;
    font-size:0.95rem;
  }
  .year-control input{
    width:80px;
    padding:6px 8px;
    border:1px solid var(--line);
    border-radius:6px;
    background:var(--card);
    font-family:inherit;
    font-size:1rem;
    color:var(--ink);
  }
  .top-actions{ display:flex; gap:8px; flex-wrap:wrap; }
  button{
    cursor:pointer;
    font-family:'Inter',sans-serif;
    border:none;
    border-radius:7px;
    transition: background .15s ease, transform .05s ease;
  }
  button:active{ transform: translateY(1px); }
  .btn{
    padding:8px 14px;
    font-size:0.85rem;
    font-weight:600;
    background:var(--card);
    border:1px solid var(--line);
    color:var(--ink);
  }
  .btn:hover{ background:var(--paper-soft); }
  .btn.primary{ background:var(--accent); color:#fff; border-color:var(--accent); }
  .btn.primary:hover{ background:var(--accent-dark); }
  .btn.ghost{ background:transparent; border:1px dashed var(--line); color:var(--ink-soft); }
  .btn.ghost:hover{ background:var(--paper-soft); }
  .btn.small{ padding:4px 10px; font-size:0.78rem; }

  /* ---------- Sidebar (ledger tabs) ---------- */
  nav.sidebar{
    border-right:1px solid var(--line);
    background:var(--paper-soft);
    padding:18px 0;
  }
  .tab{
    display:flex;
    align-items:center;
    gap:10px;
    padding:11px 18px 11px 22px;
    cursor:pointer;
    font-size:0.92rem;
    color:var(--ink-soft);
    border-left:4px solid transparent;
    position:relative;
    user-select:none;
  }
  .tab .num{
    font-family:'IBM Plex Mono',monospace;
    font-size:0.72rem;
    color:var(--ink-soft);
    opacity:.6;
    width:20px;
  }
  .tab:hover{ background:var(--accent-soft); color:var(--ink); }
  .tab.active{
    background:var(--card);
    color:var(--accent-dark);
    border-left-color:var(--accent);
    font-weight:600;
    box-shadow: inset 0 1px 0 var(--line), inset 0 -1px 0 var(--line);
  }
  .tab.active .num{ color:var(--accent); opacity:1;}
  .tab.special{
    margin-top:10px;
    border-top:1px solid var(--line);
    padding-top:16px;
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:1rem;
  }

  /* ---------- Main ---------- */
  main{ padding:28px 32px 60px; max-width:1180px; }

  .month-header{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:18px;
  }
  .month-header h2{ font-size:2.1rem; }
  .month-header .period{ font-family:'IBM Plex Mono',monospace; color:var(--ink-soft); font-size:0.85rem;}

  /* summary cards */
  .summary-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:14px;
    margin-bottom:22px;
  }
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:10px;
    padding:16px 18px;
    box-shadow:var(--shadow);
  }
  .card .label{
    font-size:0.72rem;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--ink-soft);
    font-family:'IBM Plex Mono',monospace;
    margin-bottom:6px;
  }
  .card .value{
    font-family:'IBM Plex Mono',monospace;
    font-size:1.5rem;
    font-weight:600;
  }
  .card.income .value{ color:var(--accent-dark); }
  .card.expense .value{ color:var(--red); }
  .card.invest .value{ color:var(--gold); }
  .card.balance .value.positive{ color:var(--accent-dark); }
  .card.balance .value.negative{ color:var(--red); }
  .card .accent-bar{ height:3px; border-radius:3px; margin-top:10px; }
  .card.income .accent-bar{ background:var(--accent); }
  .card.expense .accent-bar{ background:var(--red); }
  .card.invest .accent-bar{ background:var(--gold); }
  .card.balance .accent-bar{ background:var(--ink); opacity:.25; }

  /* charts */
  .chart-grid{
    display:grid;
    grid-template-columns: 1.4fr 1fr;
    gap:16px;
    margin-bottom:28px;
  }
  .chart-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:10px;
    padding:16px 18px;
    box-shadow:var(--shadow);
  }
  .chart-card h3{ font-size:1rem; margin-bottom:10px; font-weight:600;}
  .chart-card .canvas-wrap{ position:relative; height:240px; }
  .chart-card .empty-note{
    font-size:0.85rem; color:var(--ink-soft); text-align:center; padding-top:90px;
  }

  /* weeks */
  .weeks{ display:flex; flex-direction:column; gap:14px; }
  .week-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:10px;
    box-shadow:var(--shadow);
    overflow:hidden;
  }
  .week-head{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 18px;
    cursor:pointer;
    gap:14px;
    flex-wrap:wrap;
  }
  .week-head:hover{ background:var(--paper-soft); }
  .week-title{ display:flex; align-items:baseline; gap:10px; }
  .week-title h3{ font-size:1.1rem; }
  .week-title .range{ font-family:'IBM Plex Mono',monospace; font-size:0.78rem; color:var(--ink-soft); }
  .week-mini-totals{
    display:flex; gap:18px; font-family:'IBM Plex Mono',monospace; font-size:0.82rem;
  }
  .week-mini-totals span.lbl{ color:var(--ink-soft); margin-right:4px;}
  .week-mini-totals .t-income{ color:var(--accent-dark); }
  .week-mini-totals .t-expense{ color:var(--red); }
  .week-mini-totals .t-invest{ color:var(--gold); }
  .week-mini-totals .t-balance.positive{ color:var(--accent-dark); }
  .week-mini-totals .t-balance.negative{ color:var(--red); }
  .chevron{ font-size:0.8rem; color:var(--ink-soft); transition: transform .15s ease; }
  .week-card.collapsed .chevron{ transform: rotate(-90deg); }
  .week-body{ padding:0 18px 18px; display:grid; grid-template-columns: repeat(auto-fit, minmax(280px,1fr)); gap:16px; }
  .week-card.collapsed .week-body{ display:none; }

  .ledger{ border:1px solid var(--line); border-radius:8px; overflow:hidden; }
  .ledger-head{
    display:flex; align-items:center; justify-content:space-between;
    padding:8px 12px; background:var(--paper-soft);
    font-size:0.78rem; text-transform:uppercase; letter-spacing:0.06em; font-weight:600;
    color:var(--ink-soft);
  }
  .ledger-head.income{ border-left:4px solid var(--accent); }
  .ledger-head.expense{ border-left:4px solid var(--red); }
  .ledger-head.invest{ border-left:4px solid var(--gold); }
  table.lines{ width:100%; border-collapse:collapse; font-size:0.85rem; }
  table.lines th{
    text-align:left; font-size:0.7rem; text-transform:uppercase; letter-spacing:0.05em;
    color:var(--ink-soft); padding:6px 10px; border-bottom:1px solid var(--line); font-weight:600;
  }
  table.lines td{ padding:5px 8px; border-bottom:1px solid var(--paper-soft); vertical-align:middle; }
  table.lines tr:last-child td{ border-bottom:none; }
  table.lines input[type="text"], table.lines select{
    width:100%; border:1px solid transparent; background:transparent;
    padding:5px 6px; border-radius:5px; font-family:inherit; font-size:0.85rem; color:var(--ink);
  }
  table.lines input[type="number"]{
    width:100%; border:1px solid transparent; background:transparent;
    padding:5px 6px; border-radius:5px; font-family:'IBM Plex Mono',monospace; font-size:0.85rem;
    text-align:right; color:var(--ink);
  }
  table.lines input:hover, table.lines select:hover,
  table.lines input:focus, table.lines select:focus{
    border-color:var(--line); background:var(--paper-soft); outline:none;
  }
  table.lines .col-val{ width:110px; }
  table.lines .col-cat{ width:130px; }
  table.lines .col-del{ width:30px; text-align:center; }
  .del-btn{
    background:transparent; border:none; color:var(--ink-soft); font-size:1rem; line-height:1;
    padding:2px 6px; border-radius:5px;
  }
  .del-btn:hover{ color:var(--red); background:var(--paper-soft); }
  tfoot td{ font-family:'IBM Plex Mono',monospace; font-weight:600; padding:8px 10px; border-top:1px solid var(--line); }
  tfoot td.tot-label{ color:var(--ink-soft); font-size:0.78rem; text-transform:uppercase; letter-spacing:0.05em; font-weight:600; }
  .ledger-foot{ padding:8px 12px; }
  .add-row-btn{ width:100%; }

  /* annual view */
  .annual-table-wrap{ overflow-x:auto; border:1px solid var(--line); border-radius:10px; background:var(--card); box-shadow:var(--shadow); margin-bottom:24px;}
  table.annual{ width:100%; border-collapse:collapse; font-size:0.88rem; min-width:680px;}
  table.annual th, table.annual td{ padding:10px 14px; text-align:right; border-bottom:1px solid var(--paper-soft); }
  table.annual th{ text-align:left; font-family:'IBM Plex Mono',monospace; font-size:0.7rem; text-transform:uppercase; letter-spacing:0.06em; color:var(--ink-soft); background:var(--paper-soft); }
  table.annual td:first-child, table.annual th:first-child{ text-align:left; font-family:'Fraunces',serif; font-weight:600; }
  table.annual td{ font-family:'IBM Plex Mono',monospace; }
  table.annual tr:last-child td{ font-weight:700; background:var(--paper-soft); border-bottom:none; }
  td.pos{ color:var(--accent-dark); }
  td.neg{ color:var(--red); }
  td.gold{ color:var(--gold); }

  footer.notes{
    margin-top:32px; padding-top:18px; border-top:1px solid var(--line);
    font-size:0.8rem; color:var(--ink-soft);
  }
  footer.notes p{ margin:4px 0; }

  /* mobile */
  @media (max-width: 820px){
    .app{ grid-template-columns: 1fr; }
    nav.sidebar{
      display:flex; overflow-x:auto; border-right:none; border-bottom:1px solid var(--line);
      padding:8px 6px; gap:2px;
    }
    .tab{ flex:0 0 auto; white-space:nowrap; border-left:none; border-bottom:3px solid transparent; padding:8px 12px; border-radius:6px; }
    .tab.active{ border-left:none; border-bottom-color:var(--accent); box-shadow:none; }
    .tab.special{ margin-top:0; border-top:none; padding-top:8px; border-left:1px solid var(--line); }
    main{ padding:18px 16px 48px; }
    .chart-grid{ grid-template-columns: 1fr; }
    .month-header h2{ font-size:1.6rem; }
  }
  @media (max-width: 480px){
    header.top{ padding:16px; }
    .week-mini-totals{ gap:10px; font-size:0.74rem; flex-wrap:wrap;}
  }
</style>
</head>
<body>

<div class="app">
  <header class="top">
    <div class="brand">
      <h1>📒 Livro-Caixa</h1>
      <span class="tagline">Planejador financeiro semanal</span>
    </div>
    <div class="year-control">
      <label for="yearInput">Ano</label>
      <input type="number" id="yearInput" value="2026" min="2020" max="2099">
    </div>
    <div class="top-actions">
      <button class="btn" id="exportBtn">⭳ Exportar backup</button>
      <button class="btn" id="importBtn">⭱ Importar backup</button>
      <button class="btn ghost" id="clearMonthBtn">Limpar mês</button>
      <input type="file" id="importFile" accept=".json" style="display:none;">
    </div>
  </header>

  <nav class="sidebar" id="sidebar">
    <!-- months + annual tab rendered by JS -->
  </nav>

  <main id="main">
    <!-- content rendered by JS -->
  </main>
</div>

<script>
/* ===========================================================
   DADOS BÁSICOS
=========================================================== */
const MONTHS = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

const EXPENSE_CATEGORIES = ["Moradia","Alimentação","Transporte","Saúde","Lazer","Educação","Assinaturas","Outros"];
const EXPENSE_COLORS = {
  "Moradia":"#8B5E3C","Alimentação":"#C9A04A","Transporte":"#5C7A8A","Saúde":"#B4533C",
  "Lazer":"#6B8E6B","Educação":"#7E6CAB","Assinaturas":"#4A7A6F","Outros":"#9C9286"
};

const INVEST_TYPES = ["Reserva de Emergência","Renda Fixa","Renda Variável","Previdência","Cripto","Outros"];
const INVEST_COLORS = {
  "Reserva de Emergência":"#4A7A6F","Renda Fixa":"#2F6F4F","Renda Variável":"#C9A04A",
  "Previdência":"#5C7A8A","Cripto":"#B4533C","Outros":"#9C9286"
};

const STORAGE_KEY = "livro-caixa-planner-v1";

/* ===========================================================
   ESTADO
=========================================================== */
let DB = loadDB();
let state = {
  year: DB.lastYear || 2026,
  view: "month",   // "month" ou "annual"
  month: DB.lastMonth ?? new Date().getMonth(),
  collapsed: {}    // chave "year-month-week" -> bool
};

let charts = { weekly:null, category:null, annual:null };

/* ===========================================================
   PERSISTÊNCIA
=========================================================== */
function loadDB(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){ console.warn("Falha ao ler dados salvos", e); }
  return { years:{}, lastYear:2026, lastMonth:new Date().getMonth() };
}
function saveDB(){
  DB.lastYear = state.year;
  DB.lastMonth = state.month;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(DB));
}

/* ===========================================================
   SEMANAS (segunda a domingo)
=========================================================== */
function getMonthWeeks(year, month){
  const first = new Date(year, month, 1);
  const last = new Date(year, month+1, 0);
  let start = new Date(first);
  const dow = (start.getDay()+6)%7; // segunda=0
  start.setDate(start.getDate()-dow);
  const weeks = [];
  let cur = new Date(start);
  while(cur <= last){
    const ws = new Date(cur);
    const we = new Date(cur); we.setDate(we.getDate()+6);
    weeks.push({start:ws, end:we});
    cur.setDate(cur.getDate()+7);
  }
  return weeks;
}
function fmtDate(d){
  return String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0");
}
function fmtRange(w){ return fmtDate(w.start)+" – "+fmtDate(w.end); }

/* ===========================================================
   ACESSO / GARANTIA DE ESTRUTURA DE DADOS
=========================================================== */
function ensureYear(year){
  if(!DB.years[year]) DB.years[year] = {};
  return DB.years[year];
}
function ensureMonth(year, month){
  const y = ensureYear(year);
  if(!y[month]) y[month] = { weeks:[] };
  const weeksMeta = getMonthWeeks(year, month);
  while(y[month].weeks.length < weeksMeta.length){
    y[month].weeks.push({ income:[], expenses:[], investments:[] });
  }
  // garante arrays mesmo se vier corrompido
  y[month].weeks.forEach(w=>{
    w.income = w.income || [];
    w.expenses = w.expenses || [];
    w.investments = w.investments || [];
  });
  return y[month];
}
function getMonthData(year, month){ return ensureMonth(year, month); }

/* ===========================================================
   FORMATAÇÃO
=========================================================== */
function fmtMoney(v){
  v = Number(v)||0;
  const neg = v < 0;
  v = Math.abs(v);
  const parts = v.toFixed(2).split('.');
  let intPart = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, '.');
  return (neg?'-':'') + '€ ' + intPart + ',' + parts[1];
}

/* ===========================================================
   CÁLCULOS
=========================================================== */
function sumField(arr, field){ return arr.reduce((s,it)=> s + (Number(it[field])||0), 0); }

function weekTotals(week){
  const income = sumField(week.income,'valor');
  const expense = sumField(week.expenses,'valor');
  const invest = sumField(week.investments,'valor');
  return { income, expense, invest, balance: income - expense - invest };
}
function monthTotals(year, month){
  const m = getMonthData(year, month);
  let income=0, expense=0, invest=0;
  m.weeks.forEach(w=>{
    const t = weekTotals(w);
    income += t.income; expense += t.expense; invest += t.invest;
  });
  return { income, expense, invest, balance: income-expense-invest };
}
function monthExpensesByCategory(year, month){
  const m = getMonthData(year, month);
  const totals = {};
  EXPENSE_CATEGORIES.forEach(c=> totals[c]=0);
  m.weeks.forEach(w=> w.expenses.forEach(e=>{
    const cat = EXPENSE_CATEGORIES.includes(e.categoria) ? e.categoria : "Outros";
    totals[cat] += Number(e.valor)||0;
  }));
  return totals;
}

/* ===========================================================
   RENDER: SIDEBAR
=========================================================== */
function renderSidebar(){
  const nav = document.getElementById('sidebar');
  nav.innerHTML = "";
  MONTHS.forEach((name, idx)=>{
    const tab = document.createElement('div');
    tab.className = 'tab' + (state.view==='month' && state.month===idx ? ' active' : '');
    tab.innerHTML = `<span class="num">${String(idx+1).padStart(2,'0')}</span><span>${name}</span>`;
    tab.onclick = ()=>{ state.view='month'; state.month=idx; saveDB(); renderAll(); };
    nav.appendChild(tab);
  });
  const annual = document.createElement('div');
  annual.className = 'tab special' + (state.view==='annual' ? ' active' : '');
  annual.innerHTML = `<span>📊 Resumo Anual</span>`;
  annual.onclick = ()=>{ state.view='annual'; saveDB(); renderAll(); };
  nav.appendChild(annual);
}

/* ===========================================================
   RENDER: VISÃO MENSAL
=========================================================== */
function renderMonthView(){
  const main = document.getElementById('main');
  const year = state.year, month = state.month;
  const weeksMeta = getMonthWeeks(year, month);
  const monthData = getMonthData(year, month);
  const totals = monthTotals(year, month);

  main.innerHTML = `
    <div class="month-header">
      <h2>${MONTHS[month]} <span class="mono" style="font-size:1.2rem;color:var(--ink-soft);">${year}</span></h2>
      <span class="period">${weeksMeta.length} semanas · ${fmtDate(weeksMeta[0].start)} a ${fmtDate(weeksMeta[weeksMeta.length-1].end)}</span>
    </div>

    <div class="summary-grid">
      <div class="card income">
        <div class="label">Ganhos do mês</div>
        <div class="value mono">${fmtMoney(totals.income)}</div>
        <div class="accent-bar"></div>
      </div>
      <div class="card expense">
        <div class="label">Despesas do mês</div>
        <div class="value mono">${fmtMoney(totals.expense)}</div>
        <div class="accent-bar"></div>
      </div>
      <div class="card invest">
        <div class="label">Investido no mês</div>
        <div class="value mono">${fmtMoney(totals.invest)}</div>
        <div class="accent-bar"></div>
      </div>
      <div class="card balance">
        <div class="label">Saldo final</div>
        <div class="value mono ${totals.balance>=0?'positive':'negative'}">${fmtMoney(totals.balance)}</div>
        <div class="accent-bar"></div>
      </div>
    </div>

    <div class="chart-grid">
      <div class="chart-card">
        <h3>Ganhos × Despesas × Investimentos por semana</h3>
        <div class="canvas-wrap"><canvas id="weeklyChart"></canvas></div>
      </div>
      <div class="chart-card">
        <h3>Despesas por categoria</h3>
        <div class="canvas-wrap" id="categoryChartWrap"><canvas id="categoryChart"></canvas></div>
      </div>
    </div>

    <div class="weeks" id="weeksContainer"></div>

    <footer class="notes">
      <p>💾 Seus dados ficam salvos automaticamente neste navegador (localStorage). Use <strong>Exportar backup</strong> para guardar um arquivo .json e <strong>Importar backup</strong> para restaurar ou levar os dados para outro dispositivo/navegador.</p>
      <p>📅 As semanas começam na segunda-feira (dia do recebimento) e terminam no domingo.</p>
    </footer>
  `;

  const container = document.getElementById('weeksContainer');
  weeksMeta.forEach((wmeta, wIdx)=>{
    container.appendChild(buildWeekCard(year, month, wIdx, wmeta));
  });

  renderWeeklyChart(year, month, weeksMeta);
  renderCategoryChart(year, month);
}

/* ---------- Cartão de semana ---------- */
function buildWeekCard(year, month, weekIdx, wmeta){
  const week = getMonthData(year,month).weeks[weekIdx];
  const t = weekTotals(week);
  const key = `${year}-${month}-${weekIdx}`;
  const collapsed = !!state.collapsed[key];

  const card = document.createElement('div');
  card.className = 'week-card' + (collapsed ? ' collapsed' : '');
  card.id = 'weekcard-'+weekIdx;

  card.innerHTML = `
    <div class="week-head">
      <div class="week-title">
        <h3>Semana ${weekIdx+1}</h3>
        <span class="range mono">${fmtRange(wmeta)}</span>
      </div>
      <div class="week-mini-totals mono">
        <span><span class="lbl">Ganhos</span><span class="t-income">${fmtMoney(t.income)}</span></span>
        <span><span class="lbl">Despesas</span><span class="t-expense">${fmtMoney(t.expense)}</span></span>
        <span><span class="lbl">Investido</span><span class="t-invest">${fmtMoney(t.invest)}</span></span>
        <span><span class="lbl">Saldo</span><span class="t-balance ${t.balance>=0?'positive':'negative'}">${fmtMoney(t.balance)}</span></span>
      </div>
      <span class="chevron">▾</span>
    </div>
    <div class="week-body">
      ${buildLedgerHTML(weekIdx,'income')}
      ${buildLedgerHTML(weekIdx,'expenses')}
      ${buildLedgerHTML(weekIdx,'investments')}
    </div>
  `;

  card.querySelector('.week-head').onclick = ()=>{
    state.collapsed[key] = !collapsed;
    card.classList.toggle('collapsed');
  };

  // popula tabelas
  ['income','expenses','investments'].forEach(type=>{
    renderLedgerRows(card, weekIdx, type);
  });

  return card;
}

/* ---------- Estrutura (cabeçalho + tabela vazia) de cada ledger ---------- */
function buildLedgerHTML(weekIdx, type){
  const cfg = ledgerConfig(type);
  return `
    <div class="ledger" data-week="${weekIdx}" data-type="${type}">
      <div class="ledger-head ${cfg.cls}">
        <span>${cfg.icon} ${cfg.title}</span>
      </div>
      <table class="lines">
        <thead><tr>
          <th>Descrição</th>
          ${cfg.hasCat ? `<th class="col-cat">${cfg.catLabel}</th>` : ''}
          <th class="col-val">Valor</th>
          <th class="col-del"></th>
        </tr></thead>
        <tbody class="ledger-body"></tbody>
        <tfoot><tr>
          <td class="tot-label" colspan="${cfg.hasCat?2:1}">Total</td>
          <td class="ledger-total mono"></td>
          <td></td>
        </tr></tfoot>
      </table>
      <div class="ledger-foot">
        <button class="btn small add-row-btn">+ adicionar ${cfg.itemName}</button>
      </div>
    </div>
  `;
}
function ledgerConfig(type){
  if(type==='income') return {title:'Ganhos', icon:'💰', cls:'income', hasCat:false, itemName:'ganho', emptyItem:()=>({desc:'',valor:0})};
  if(type==='expenses') return {title:'Despesas', icon:'🧾', cls:'expense', hasCat:true, catLabel:'Categoria', itemName:'despesa', emptyItem:()=>({desc:'',categoria:'Outros',valor:0})};
  return {title:'Investimentos', icon:'📈', cls:'invest', hasCat:true, catLabel:'Tipo', itemName:'investimento', emptyItem:()=>({desc:'',tipo:'Outros',valor:0})};
}

/* ---------- Renderiza linhas de um ledger ---------- */
function renderLedgerRows(cardEl, weekIdx, type){
  const ledgerEl = cardEl.querySelector(`.ledger[data-type="${type}"]`);
  const tbody = ledgerEl.querySelector('.ledger-body');
  const cfg = ledgerConfig(type);
  const week = getMonthData(state.year, state.month).weeks[weekIdx];
  const items = week[type];

  tbody.innerHTML = '';
  items.forEach((item, idx)=>{
    const tr = document.createElement('tr');

    // descrição
    const tdDesc = document.createElement('td');
    const inputDesc = document.createElement('input');
    inputDesc.type = 'text';
    inputDesc.placeholder = type==='income' ? 'Ex: Salário' : (type==='expenses' ? 'Ex: Supermercado' : 'Ex: Tesouro Selic');
    inputDesc.value = item.desc || '';
    inputDesc.oninput = (e)=>{ item.desc = e.target.value; saveDB(); };
    tdDesc.appendChild(inputDesc);
    tr.appendChild(tdDesc);

    // categoria / tipo
    if(cfg.hasCat){
      const tdCat = document.createElement('td');
      tdCat.className = 'col-cat';
      const select = document.createElement('select');
      const options = type==='expenses' ? EXPENSE_CATEGORIES : INVEST_TYPES;
      const field = type==='expenses' ? 'categoria' : 'tipo';
      if(!item[field]) item[field] = 'Outros';
      options.forEach(opt=>{
        const o = document.createElement('option');
        o.value = opt; o.textContent = opt;
        if(item[field]===opt) o.selected = true;
        select.appendChild(o);
      });
      select.onchange = (e)=>{
        item[field] = e.target.value; saveDB();
        if(type==='expenses') renderCategoryChart(state.year, state.month);
      };
      tdCat.appendChild(select);
      tr.appendChild(tdCat);
    }

    // valor
    const tdVal = document.createElement('td');
    tdVal.className = 'col-val';
    const inputVal = document.createElement('input');
    inputVal.type = 'number';
    inputVal.step = '0.01';
    inputVal.min = '0';
    inputVal.placeholder = '0,00';
    inputVal.value = item.valor ? item.valor : '';
    inputVal.oninput = (e)=>{
      item.valor = parseFloat(e.target.value)||0;
      saveDB();
      updateWeekTotals(weekIdx, cardEl);
      updateMonthSummary();
      renderWeeklyChart(state.year, state.month, getMonthWeeks(state.year, state.month));
      if(type==='expenses') renderCategoryChart(state.year, state.month);
      updateLedgerTotal(ledgerEl, items);
    };
    tdVal.appendChild(inputVal);
    tr.appendChild(tdVal);

    // remover
    const tdDel = document.createElement('td');
    tdDel.className = 'col-del';
    const delBtn = document.createElement('button');
    delBtn.className = 'del-btn';
    delBtn.title = 'Remover linha';
    delBtn.textContent = '✕';
    delBtn.onclick = ()=>{
      items.splice(idx,1);
      saveDB();
      renderLedgerRows(cardEl, weekIdx, type);
      updateWeekTotals(weekIdx, cardEl);
      updateMonthSummary();
      renderWeeklyChart(state.year, state.month, getMonthWeeks(state.year, state.month));
      if(type==='expenses') renderCategoryChart(state.year, state.month);
    };
    tdDel.appendChild(delBtn);
    tr.appendChild(tdDel);

    tbody.appendChild(tr);
  });

  updateLedgerTotal(ledgerEl, items);

  // botão adicionar (rebind a cada render)
  const addBtn = ledgerEl.querySelector('.add-row-btn');
  addBtn.onclick = ()=>{
    items.push(cfg.emptyItem());
    saveDB();
    renderLedgerRows(cardEl, weekIdx, type);
  };
}

function updateLedgerTotal(ledgerEl, items){
  const total = sumField(items,'valor');
  ledgerEl.querySelector('.ledger-total').textContent = fmtMoney(total);
}

/* ---------- Atualiza totais da semana sem re-renderizar inputs ---------- */
function updateWeekTotals(weekIdx, cardEl){
  const week = getMonthData(state.year, state.month).weeks[weekIdx];
  const t = weekTotals(week);
  const mini = cardEl.querySelector('.week-mini-totals');
  mini.querySelector('.t-income').textContent = fmtMoney(t.income);
  mini.querySelector('.t-expense').textContent = fmtMoney(t.expense);
  mini.querySelector('.t-invest').textContent = fmtMoney(t.invest);
  const bal = mini.querySelector('.t-balance');
  bal.textContent = fmtMoney(t.balance);
  bal.classList.toggle('positive', t.balance>=0);
  bal.classList.toggle('negative', t.balance<0);
}

/* ---------- Atualiza cards de resumo mensal ---------- */
function updateMonthSummary(){
  const totals = monthTotals(state.year, state.month);
  const cards = document.querySelectorAll('.summary-grid .card');
  if(cards.length<4) return;
  cards[0].querySelector('.value').textContent = fmtMoney(totals.income);
  cards[1].querySelector('.value').textContent = fmtMoney(totals.expense);
  cards[2].querySelector('.value').textContent = fmtMoney(totals.invest);
  const balVal = cards[3].querySelector('.value');
  balVal.textContent = fmtMoney(totals.balance);
  balVal.classList.toggle('positive', totals.balance>=0);
  balVal.classList.toggle('negative', totals.balance<0);
}

/* ===========================================================
   GRÁFICOS
=========================================================== */
function chartFont(){
  return { family: "'Inter', sans-serif", size: 12 };
}

function renderWeeklyChart(year, month, weeksMeta){
  const ctx = document.getElementById('weeklyChart');
  if(!ctx) return;
  const m = getMonthData(year, month);
  const labels = weeksMeta.map((w,i)=>`Sem. ${i+1}`);
  const income = m.weeks.map(w=> weekTotals(w).income);
  const expense = m.weeks.map(w=> weekTotals(w).expense);
  const invest = m.weeks.map(w=> weekTotals(w).invest);

  if(charts.weekly) charts.weekly.destroy();
  charts.weekly = new Chart(ctx, {
    type:'bar',
    data:{
      labels,
      datasets:[
        {label:'Ganhos', data:income, backgroundColor:'#2F6F4F', borderRadius:4},
        {label:'Despesas', data:expense, backgroundColor:'#B4533C', borderRadius:4},
        {label:'Investimentos', data:invest, backgroundColor:'#C9A04A', borderRadius:4},
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{ position:'bottom', labels:{font:chartFont()} },
        tooltip:{ callbacks:{ label:(c)=> `${c.dataset.label}: ${fmtMoney(c.raw)}` } }
      },
      scales:{
        y:{ beginAtZero:true, ticks:{ font:chartFont(), callback:(v)=> '€ '+v } },
        x:{ ticks:{ font:chartFont() } }
      }
    }
  });
}

function renderCategoryChart(year, month){
  const ctx = document.getElementById('categoryChart');
  const wrap = document.getElementById('categoryChartWrap');
  if(!ctx) return;
  const totals = monthExpensesByCategory(year, month);
  const labels = Object.keys(totals).filter(k=> totals[k] > 0);
  const data = labels.map(l=> totals[l]);

  if(charts.category) { charts.category.destroy(); charts.category=null; }

  if(labels.length===0){
    wrap.innerHTML = '<div class="empty-note">Sem despesas cadastradas neste mês ainda.</div>';
    return;
  }
  if(!wrap.querySelector('canvas')){
    wrap.innerHTML = '<canvas id="categoryChart"></canvas>';
  }
  const newCtx = document.getElementById('categoryChart');
  charts.category = new Chart(newCtx, {
    type:'doughnut',
    data:{
      labels,
      datasets:[{ data, backgroundColor: labels.map(l=> EXPENSE_COLORS[l]), borderWidth:0 }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{ position:'bottom', labels:{ font:chartFont(), boxWidth:12 } },
        tooltip:{ callbacks:{ label:(c)=> `${c.label}: ${fmtMoney(c.raw)}` } }
      },
      cutout:'60%'
    }
  });
}

/* ===========================================================
   VISÃO ANUAL
=========================================================== */
function renderAnnualView(){
  const main = document.getElementById('main');
  const year = state.year;
  const rows = MONTHS.map((name, idx)=> ({ name, idx, t: monthTotals(year, idx) }));
  const totalYear = rows.reduce((acc,r)=>{
    acc.income += r.t.income; acc.expense += r.t.expense; acc.invest += r.t.invest; acc.balance += r.t.balance;
    return acc;
  }, {income:0,expense:0,invest:0,balance:0});

  main.innerHTML = `
    <div class="month-header">
      <h2>Resumo Anual <span class="mono" style="font-size:1.2rem;color:var(--ink-soft);">${year}</span></h2>
      <span class="period">Visão consolidada de todos os meses</span>
    </div>

    <div class="summary-grid">
      <div class="card income"><div class="label">Ganhos no ano</div><div class="value mono">${fmtMoney(totalYear.income)}</div><div class="accent-bar"></div></div>
      <div class="card expense"><div class="label">Despesas no ano</div><div class="value mono">${fmtMoney(totalYear.expense)}</div><div class="accent-bar"></div></div>
      <div class="card invest"><div class="label">Investido no ano</div><div class="value mono">${fmtMoney(totalYear.invest)}</div><div class="accent-bar"></div></div>
      <div class="card balance"><div class="label">Saldo do ano</div><div class="value mono ${totalYear.balance>=0?'positive':'negative'}">${fmtMoney(totalYear.balance)}</div><div class="accent-bar"></div></div>
    </div>

    <div class="chart-card" style="margin-bottom:24px;">
      <h3>Ganhos, despesas, investimentos e saldo por mês</h3>
      <div class="canvas-wrap" style="height:320px;"><canvas id="annualChart"></canvas></div>
    </div>

    <div class="annual-table-wrap">
      <table class="annual">
        <thead><tr>
          <th>Mês</th><th>Ganhos</th><th>Despesas</th><th>Investimentos</th><th>Saldo</th>
        </tr></thead>
        <tbody>
          ${rows.map(r=>`
            <tr>
              <td>${r.name}</td>
              <td class="pos">${fmtMoney(r.t.income)}</td>
              <td class="neg">${fmtMoney(r.t.expense)}</td>
              <td class="gold">${fmtMoney(r.t.invest)}</td>
              <td class="${r.t.balance>=0?'pos':'neg'}">${fmtMoney(r.t.balance)}</td>
            </tr>
          `).join('')}
          <tr>
            <td>Total</td>
            <td class="pos">${fmtMoney(totalYear.income)}</td>
            <td class="neg">${fmtMoney(totalYear.expense)}</td>
            <td class="gold">${fmtMoney(totalYear.invest)}</td>
            <td class="${totalYear.balance>=0?'pos':'neg'}">${fmtMoney(totalYear.balance)}</td>
          </tr>
        </tbody>
      </table>
    </div>

    <footer class="notes">
      <p>💾 Dados salvos automaticamente neste navegador. Clique em um mês na lateral para editar ganhos, despesas e investimentos semana a semana.</p>
    </footer>
  `;

  const ctx = document.getElementById('annualChart');
  if(charts.annual) charts.annual.destroy();
  charts.annual = new Chart(ctx, {
    data:{
      labels: rows.map(r=> r.name.slice(0,3)),
      datasets:[
        {type:'bar', label:'Ganhos', data: rows.map(r=>r.t.income), backgroundColor:'#2F6F4F', borderRadius:4},
        {type:'bar', label:'Despesas', data: rows.map(r=>r.t.expense), backgroundColor:'#B4533C', borderRadius:4},
        {type:'bar', label:'Investimentos', data: rows.map(r=>r.t.invest), backgroundColor:'#C9A04A', borderRadius:4},
        {type:'line', label:'Saldo', data: rows.map(r=>r.t.balance), borderColor:'#20302A', backgroundColor:'#20302A', tension:.3, pointRadius:3, yAxisID:'y'}
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{ position:'bottom', labels:{font:chartFont()} },
        tooltip:{ callbacks:{ label:(c)=> `${c.dataset.label}: ${fmtMoney(c.raw)}` } }
      },
      scales:{
        y:{ ticks:{ font:chartFont(), callback:(v)=> '€ '+v } },
        x:{ ticks:{ font:chartFont() } }
      }
    }
  });
}

/* ===========================================================
   RENDER GERAL
=========================================================== */
function renderAll(){
  renderSidebar();
  if(state.view==='annual') renderAnnualView();
  else renderMonthView();
}

/* ===========================================================
   AÇÕES DE TOPO
=========================================================== */
document.getElementById('yearInput').value = state.year;
document.getElementById('yearInput').addEventListener('change', (e)=>{
  let y = parseInt(e.target.value);
  if(isNaN(y) || y < 2020) y = 2026;
  state.year = y;
  e.target.value = y;
  saveDB();
  renderAll();
});

document.getElementById('exportBtn').onclick = ()=>{
  const blob = new Blob([JSON.stringify(DB, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `livro-caixa-backup-${state.year}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
};

document.getElementById('importBtn').onclick = ()=> document.getElementById('importFile').click();
document.getElementById('importFile').addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (evt)=>{
    try{
      const parsed = JSON.parse(evt.target.result);
      if(!parsed.years) throw new Error('Formato inválido');
      DB = parsed;
      state.year = DB.lastYear || state.year;
      state.month = DB.lastMonth ?? state.month;
      document.getElementById('yearInput').value = state.year;
      saveDB();
      renderAll();
      alert('Backup importado com sucesso!');
    }catch(err){
      alert('Não foi possível importar este arquivo. Verifique se é um backup válido do Livro-Caixa.');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

document.getElementById('clearMonthBtn').onclick = ()=>{
  if(state.view!=='month') { alert('Selecione um mês para limpar.'); return; }
  if(!confirm(`Tem certeza que deseja limpar todos os dados de ${MONTHS[state.month]}/${state.year}? Essa ação não pode ser desfeita.`)) return;
  const y = ensureYear(state.year);
  delete y[state.month];
  ensureMonth(state.year, state.month);
  saveDB();
  renderAll();
};

/* ===========================================================
   INICIALIZAÇÃO
=========================================================== */
ensureMonth(state.year, state.month);
renderAll();
</script>
