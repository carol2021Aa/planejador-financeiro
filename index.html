<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>💰 Planejador Financeiro 2026</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0D0D1A;font-family:'Segoe UI',system-ui,sans-serif;color:#E0E0FF}
  input,select{font-family:inherit}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:#1A1A2E}
  ::-webkit-scrollbar-thumb{background:#3D3D6E;border-radius:3px}
  option{background:#1A1A2E;color:#E0E0FF}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect } = React;
const {
  BarChart, Bar, LineChart, Line, PieChart, Pie, Cell,
  XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer
} = Recharts;

const MONTHS = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const EXPENSE_CATEGORIES = ["Alimentação","Transporte","Moradia","Saúde","Lazer","Educação","Vestuário","Outros"];
const INCOME_CATEGORIES = ["Salário","Freelance","Dividendos","Outros"];
const INVEST_CATEGORIES = ["Renda Fixa","Ações","FIIs","Cripto","Poupança","Outros"];
const COLORS = ["#6C63FF","#FF6584","#43BF9E","#FFB347","#4ECDC4","#C7F2A4","#FF6B6B","#A8DADC"];
const GREEN = "#43BF9E";
const RED = "#FF6584";
const PURPLE = "#6C63FF";
const GOLD = "#FFB347";
const YEAR = 2026;

function fmt(val){
  return new Intl.NumberFormat("pt-PT",{style:"currency",currency:"EUR"}).format(val||0);
}

function getWeeksOfMonth(year, month) {
  const weeks = [];
  let start = new Date(year, month, 1);
  const dow = start.getDay();
  if (dow !== 1) {
    const daysUntilMon = dow === 0 ? 1 : 8 - dow;
    start.setDate(start.getDate() + daysUntilMon);
  }
  let weekNum = 1;
  while (start.getMonth() === month) {
    const end = new Date(start);
    end.setDate(end.getDate() + 6);
    const pad = (d) => `${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}`;
    weeks.push({ id: `${year}-${month}-${weekNum}`, label: `Semana ${weekNum} (${pad(start)} – ${pad(end)})`, weekNum });
    weekNum++;
    start = new Date(start);
    start.setDate(start.getDate() + 7);
    if (weekNum > 6) break;
  }
  return weeks;
}

let _id = Date.now();
function newEntry(type) {
  const cats = type==="income"?INCOME_CATEGORIES:type==="expense"?EXPENSE_CATEGORIES:INVEST_CATEGORIES;
  return { id: ++_id, type, desc:"", cat:cats[0], amount:0 };
}

function SummaryCard({ icon, label, value, color, big }) {
  return (
    <div style={{background:"#16213E",borderRadius:14,padding:"14px 16px",border:`1px solid ${color}33`}}>
      <div style={{fontSize:11,color:"#7070A0",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.5px"}}>{icon} {label}</div>
      <div style={{fontSize:big?22:18,fontWeight:800,color,letterSpacing:"-0.5px"}}>{value}</div>
    </div>
  );
}

function EntryRow({ entry, onUpdate, onRemove }) {
  const cats = entry.type==="income"?INCOME_CATEGORIES:entry.type==="expense"?EXPENSE_CATEGORIES:INVEST_CATEGORIES;
  return (
    <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:6,flexWrap:"wrap"}}>
      <input style={IS} placeholder="Descrição" value={entry.desc} onChange={e=>onUpdate({...entry,desc:e.target.value})} />
      <select style={{...IS,width:130,flex:"0 0 130px"}} value={entry.cat} onChange={e=>onUpdate({...entry,cat:e.target.value})}>
        {cats.map(c=><option key={c}>{c}</option>)}
      </select>
      <input style={{...IS,width:110,flex:"0 0 110px",textAlign:"right"}} type="number" min="0" step="0.01"
        placeholder="0,00" value={entry.amount||""} onChange={e=>onUpdate({...entry,amount:parseFloat(e.target.value)||0})} />
      <button onClick={onRemove} style={{background:"rgba(255,101,132,0.15)",border:"none",color:RED,borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:12,flexShrink:0}}>✕</button>
    </div>
  );
}

const IS = {padding:"6px 10px",borderRadius:8,border:"1px solid #2D2D4E",background:"#1A1A2E",color:"#E0E0FF",fontSize:13,outline:"none",flex:1,minWidth:0};

function App() {
  const [selectedMonth, setSelectedMonth] = useState(new Date().getMonth());
  const [selectedWeek, setSelectedWeek] = useState(0);
  const [view, setView] = useState("semana");
  const [data, setData] = useState(() => {
    try { const s = localStorage.getItem("pfin2026"); return s ? JSON.parse(s) : {}; } catch { return {}; }
  });

  // Auto-save to localStorage
  useEffect(() => {
    try { localStorage.setItem("pfin2026", JSON.stringify(data)); } catch {}
  }, [data]);

  const weeks = useMemo(() => getWeeksOfMonth(YEAR, selectedMonth), [selectedMonth]);
  const weekKey = weeks[selectedWeek]?.id;

  function getWD(month, wKey) {
    return data[month]?.[wKey] || { income:[], expense:[], invest:[] };
  }
  function setWD(month, wKey, wd) {
    setData(d => ({ ...d, [month]: { ...d[month], [wKey]: wd } }));
  }

  const wd = weekKey ? getWD(selectedMonth, weekKey) : { income:[], expense:[], invest:[] };

  function addEntry(type) { setWD(selectedMonth, weekKey, { ...wd, [type]: [...wd[type], newEntry(type)] }); }
  function updateEntry(type, entry) { setWD(selectedMonth, weekKey, { ...wd, [type]: wd[type].map(e=>e.id===entry.id?entry:e) }); }
  function removeEntry(type, id) { setWD(selectedMonth, weekKey, { ...wd, [type]: wd[type].filter(e=>e.id!==id) }); }

  const wInc = wd.income.reduce((s,e)=>s+e.amount,0);
  const wExp = wd.expense.reduce((s,e)=>s+e.amount,0);
  const wInv = wd.invest.reduce((s,e)=>s+e.amount,0);
  const wBal = wInc - wExp - wInv;

  const monthlyStats = useMemo(() => {
    const ws = getWeeksOfMonth(YEAR, selectedMonth);
    let totalIncome=0,totalExpense=0,totalInvest=0;
    const weeklyData = ws.map(w => {
      const d = getWD(selectedMonth, w.id);
      const inc = d.income.reduce((s,e)=>s+e.amount,0);
      const exp = d.expense.reduce((s,e)=>s+e.amount,0);
      const inv = d.invest.reduce((s,e)=>s+e.amount,0);
      totalIncome+=inc; totalExpense+=exp; totalInvest+=inv;
      return { name:`Sem ${w.weekNum}`, Ganhos:inc, Despesas:exp, Investimentos:inv, Saldo:inc-exp-inv };
    });
    const expByCat={}, invByCat={};
    ws.forEach(w => {
      const d = getWD(selectedMonth, w.id);
      d.expense.forEach(e=>{ expByCat[e.cat]=(expByCat[e.cat]||0)+e.amount; });
      d.invest.forEach(e=>{ invByCat[e.cat]=(invByCat[e.cat]||0)+e.amount; });
    });
    return { totalIncome, totalExpense, totalInvest, weeklyData, expByCat, invByCat };
  }, [data, selectedMonth]);

  const yearStats = useMemo(() => MONTHS.map((_,mi) => {
    const ws = getWeeksOfMonth(YEAR, mi);
    let inc=0,exp=0,inv=0;
    ws.forEach(w => {
      const d = getWD(mi, w.id);
      inc+=d.income.reduce((s,e)=>s+e.amount,0);
      exp+=d.expense.reduce((s,e)=>s+e.amount,0);
      inv+=d.invest.reduce((s,e)=>s+e.amount,0);
    });
    return { name:MONTHS[mi].slice(0,3), Ganhos:inc, Despesas:exp, Investimentos:inv, Saldo:inc-exp-inv };
  }), [data]);

  const expPie = Object.entries(monthlyStats.expByCat).filter(([,v])=>v>0).map(([k,v])=>({name:k,value:v}));
  const invPie = Object.entries(monthlyStats.invByCat).filter(([,v])=>v>0).map(([k,v])=>({name:k,value:v}));
  const mBal = monthlyStats.totalIncome - monthlyStats.totalExpense - monthlyStats.totalInvest;

  const ttStyle = {background:"#16213E",border:"1px solid #2D2D4E",borderRadius:8,color:"#E0E0FF"};
  const card = {background:"#16213E",borderRadius:14,padding:18,marginBottom:16};

  function exportData() {
    const blob = new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
    a.download = "planejador-2026.json"; a.click();
  }
  function importData(e) {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => { try { setData(JSON.parse(ev.target.result)); } catch { alert("Ficheiro inválido"); } };
    reader.readAsText(file);
  }
  function clearData() {
    if (confirm("Apagar todos os dados? Esta ação não pode ser desfeita.")) { setData({}); localStorage.removeItem("pfin2026"); }
  }

  return (
    <div style={{background:"#0D0D1A",minHeight:"100vh",color:"#E0E0FF",paddingBottom:40}}>
      {/* HEADER */}
      <div style={{background:"linear-gradient(135deg,#1A1A3E,#0D0D1A)",borderBottom:"1px solid #2D2D4E",padding:"20px 24px 16px"}}>
        <div style={{maxWidth:1100,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
            <div>
              <div style={{fontSize:22,fontWeight:800,letterSpacing:"-0.5px",background:"linear-gradient(90deg,#6C63FF,#43BF9E)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>
                💰 Planejador Financeiro
              </div>
              <div style={{color:"#7070A0",fontSize:13,marginTop:2}}>Semanas começam na segunda-feira · {YEAR}</div>
            </div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
              {[["semana","📅 Semanal"],["mes","📊 Mensal"],["ano","🗓️ Anual"]].map(([v,l])=>(
                <button key={v} onClick={()=>setView(v)} style={{padding:"7px 14px",borderRadius:8,border:"none",cursor:"pointer",fontSize:13,fontWeight:600,background:view===v?"#6C63FF":"#1A1A2E",color:view===v?"#fff":"#9090C0"}}>{l}</button>
              ))}
              <div style={{width:1,height:24,background:"#2D2D4E",margin:"0 4px"}}/>
              <button onClick={exportData} title="Exportar dados" style={{padding:"7px 12px",borderRadius:8,border:"1px solid #2D2D4E",cursor:"pointer",fontSize:12,background:"#1A1A2E",color:"#9090C0"}}>⬇️ Exportar</button>
              <label title="Importar dados" style={{padding:"7px 12px",borderRadius:8,border:"1px solid #2D2D4E",cursor:"pointer",fontSize:12,background:"#1A1A2E",color:"#9090C0"}}>
                ⬆️ Importar<input type="file" accept=".json" style={{display:"none"}} onChange={importData}/>
              </label>
              <button onClick={clearData} title="Apagar tudo" style={{padding:"7px 12px",borderRadius:8,border:"1px solid #3D1A2E",cursor:"pointer",fontSize:12,background:"#1A1A2E",color:RED}}>🗑️</button>
            </div>
          </div>

          {/* Month selector */}
          <div style={{display:"flex",gap:6,marginTop:16,flexWrap:"wrap"}}>
            {MONTHS.map((m,i)=>(
              <button key={m} onClick={()=>{setSelectedMonth(i);setSelectedWeek(0);}} style={{padding:"5px 12px",borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:600,background:selectedMonth===i?"#6C63FF":"#1A1A2E",color:selectedMonth===i?"#fff":"#8080B0",border:selectedMonth===i?"1px solid #6C63FF":"1px solid #2D2D4E"}}>
                {m.slice(0,3)}
              </button>
            ))}
          </div>

          {/* Week selector */}
          {view==="semana" && (
            <div style={{display:"flex",gap:6,marginTop:10,flexWrap:"wrap"}}>
              {weeks.map((w,i)=>(
                <button key={w.id} onClick={()=>setSelectedWeek(i)} style={{padding:"4px 12px",borderRadius:8,cursor:"pointer",fontSize:11,fontWeight:500,whiteSpace:"nowrap",background:selectedWeek===i?"#43BF9E22":"#1A1A2E",color:selectedWeek===i?GREEN:"#8080B0",border:selectedWeek===i?`1px solid ${GREEN}`:"1px solid #2D2D4E"}}>
                  {w.label}
                </button>
              ))}
            </div>
          )}
        </div>
      </div>

      <div style={{maxWidth:1100,margin:"0 auto",padding:"20px 16px"}}>

        {/* ===== SEMANAL ===== */}
        {view==="semana" && weekKey && (<>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(175px,1fr))",gap:12,marginBottom:20}}>
            <SummaryCard icon="💵" label="Ganhos" value={fmt(wInc)} color={GREEN}/>
            <SummaryCard icon="💸" label="Despesas" value={fmt(wExp)} color={RED}/>
            <SummaryCard icon="📈" label="Investimentos" value={fmt(wInv)} color={GOLD}/>
            <SummaryCard icon="🏦" label="Saldo" value={fmt(wBal)} color={wBal>=0?GREEN:RED} big/>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:16}}>
            {/* GANHOS */}
            <div style={card}>
              <div style={{color:GREEN,fontWeight:700,fontSize:15,marginBottom:12}}>💵 Ganhos</div>
              {wd.income.map(e=><EntryRow key={e.id} entry={e} onUpdate={u=>updateEntry("income",u)} onRemove={()=>removeEntry("income",e.id)}/>)}
              <button onClick={()=>addEntry("income")} style={{background:"rgba(67,191,158,0.12)",border:"1px solid rgba(67,191,158,0.3)",color:GREEN,borderRadius:8,padding:"5px 12px",cursor:"pointer",fontSize:12,marginTop:4}}>+ Adicionar ganho</button>
            </div>
            {/* DESPESAS */}
            <div style={card}>
              <div style={{color:RED,fontWeight:700,fontSize:15,marginBottom:12}}>💸 Despesas</div>
              {wd.expense.map(e=><EntryRow key={e.id} entry={e} onUpdate={u=>updateEntry("expense",u)} onRemove={()=>removeEntry("expense",e.id)}/>)}
              <button onClick={()=>addEntry("expense")} style={{background:"rgba(255,101,132,0.12)",border:"1px solid rgba(255,101,132,0.3)",color:RED,borderRadius:8,padding:"5px 12px",cursor:"pointer",fontSize:12,marginTop:4}}>+ Adicionar despesa</button>
            </div>
            {/* INVESTIMENTOS */}
            <div style={card}>
              <div style={{color:GOLD,fontWeight:700,fontSize:15,marginBottom:12}}>📈 Investimentos</div>
              {wd.invest.map(e=><EntryRow key={e.id} entry={e} onUpdate={u=>updateEntry("invest",u)} onRemove={()=>removeEntry("invest",e.id)}/>)}
              <button onClick={()=>addEntry("invest")} style={{background:"rgba(255,179,71,0.12)",border:"1px solid rgba(255,179,71,0.3)",color:GOLD,borderRadius:8,padding:"5px 12px",cursor:"pointer",fontSize:12,marginTop:4}}>+ Adicionar investimento</button>
            </div>
          </div>

          <div style={card}>
            <div style={{color:"#A0A0C0",fontWeight:700,marginBottom:12}}>📊 Visão da Semana</div>
            <ResponsiveContainer width="100%" height={200}>
              <BarChart data={[{name:weeks[selectedWeek]?.label?.split("(")[0].trim(),Ganhos:wInc,Despesas:wExp,Investimentos:wInv}]} barSize={52}>
                <CartesianGrid strokeDasharray="3 3" stroke="#2D2D4E"/>
                <XAxis dataKey="name" tick={{fill:"#7070A0",fontSize:12}}/>
                <YAxis tick={{fill:"#7070A0",fontSize:11}} tickFormatter={v=>`€${(v/1000).toFixed(1)}k`}/>
                <Tooltip formatter={v=>fmt(v)} contentStyle={ttStyle}/>
                <Legend/>
                <Bar dataKey="Ganhos" fill={GREEN} radius={[6,6,0,0]}/>
                <Bar dataKey="Despesas" fill={RED} radius={[6,6,0,0]}/>
                <Bar dataKey="Investimentos" fill={GOLD} radius={[6,6,0,0]}/>
              </BarChart>
            </ResponsiveContainer>
          </div>
        </>)}

        {/* ===== MENSAL ===== */}
        {view==="mes" && (<>
          <div style={{color:"#A0A0C0",fontWeight:700,fontSize:18,marginBottom:16}}>📅 Resumo — {MONTHS[selectedMonth]} {YEAR}</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(175px,1fr))",gap:12,marginBottom:20}}>
            <SummaryCard icon="💵" label="Ganhos do mês" value={fmt(monthlyStats.totalIncome)} color={GREEN}/>
            <SummaryCard icon="💸" label="Despesas do mês" value={fmt(monthlyStats.totalExpense)} color={RED}/>
            <SummaryCard icon="📈" label="Investido" value={fmt(monthlyStats.totalInvest)} color={GOLD}/>
            <SummaryCard icon="🏦" label="Saldo do mês" value={fmt(mBal)} color={mBal>=0?GREEN:RED} big/>
          </div>

          <div style={card}>
            <div style={{color:"#A0A0C0",fontWeight:700,marginBottom:12}}>📊 Semanas do mês</div>
            <ResponsiveContainer width="100%" height={230}>
              <BarChart data={monthlyStats.weeklyData} barSize={28}>
                <CartesianGrid strokeDasharray="3 3" stroke="#2D2D4E"/>
                <XAxis dataKey="name" tick={{fill:"#7070A0",fontSize:12}}/>
                <YAxis tick={{fill:"#7070A0",fontSize:11}} tickFormatter={v=>`€${(v/1000).toFixed(1)}k`}/>
                <Tooltip formatter={v=>fmt(v)} contentStyle={ttStyle}/>
                <Legend/>
                <Bar dataKey="Ganhos" fill={GREEN} radius={[4,4,0,0]}/>
                <Bar dataKey="Despesas" fill={RED} radius={[4,4,0,0]}/>
                <Bar dataKey="Investimentos" fill={GOLD} radius={[4,4,0,0]}/>
              </BarChart>
            </ResponsiveContainer>
          </div>

          <div style={card}>
            <div style={{color:"#A0A0C0",fontWeight:700,marginBottom:12}}>📈 Saldo por semana</div>
            <ResponsiveContainer width="100%" height={160}>
              <LineChart data={monthlyStats.weeklyData}>
                <CartesianGrid strokeDasharray="3 3" stroke="#2D2D4E"/>
                <XAxis dataKey="name" tick={{fill:"#7070A0",fontSize:12}}/>
                <YAxis tick={{fill:"#7070A0",fontSize:11}} tickFormatter={v=>fmt(v)}/>
                <Tooltip formatter={v=>fmt(v)} contentStyle={ttStyle}/>
                <Line type="monotone" dataKey="Saldo" stroke={PURPLE} strokeWidth={2.5} dot={{fill:PURPLE,r:4}}/>
              </LineChart>
            </ResponsiveContainer>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
            <div style={card}>
              <div style={{color:"#A0A0C0",fontWeight:700,marginBottom:12}}>🍕 Despesas por categoria</div>
              {expPie.length===0
                ? <div style={{textAlign:"center",padding:"30px 0",color:"#6060A0"}}>📭 Sem despesas</div>
                : <ResponsiveContainer width="100%" height={200}>
                    <PieChart>
                      <Pie data={expPie} cx="50%" cy="50%" outerRadius={75} dataKey="value" label={({name,percent})=>`${name} ${(percent*100).toFixed(0)}%`} labelLine={false} fontSize={11}>
                        {expPie.map((_,i)=><Cell key={i} fill={COLORS[i%COLORS.length]}/>)}
                      </Pie>
                      <Tooltip formatter={v=>fmt(v)} contentStyle={ttStyle}/>
                    </PieChart>
                  </ResponsiveContainer>
              }
            </div>
            <div style={card}>
              <div style={{color:"#A0A0C0",fontWeight:700,marginBottom:12}}>💎 Investimentos por categoria</div>
              {invPie.length===0
                ? <div style={{textAlign:"center",padding:"30px 0",color:"#6060A0"}}>📭 Sem investimentos</div>
                : <ResponsiveContainer width="100%" height={200}>
                    <PieChart>
                      <Pie data={invPie} cx="50%" cy="50%" outerRadius={75} dataKey="value" label={({name,percent})=>`${name} ${(percent*100).toFixed(0)}%`} labelLine={false} fontSize={11}>
                        {invPie.map((_,i)=><Cell key={i} fill={COLORS[i%COLORS.length]}/>)}
                      </Pie>
                      <Tooltip formatter={v=>fmt(v)} contentStyle={ttStyle}/>
                    </PieChart>
                  </ResponsiveContainer>
              }
            </div>
          </div>

          <div style={card}>
            <div style={{color:"#A0A0C0",fontWeight:700,marginBottom:12}}>📋 Tabela Semanal</div>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                <thead>
                  <tr style={{borderBottom:"1px solid #2D2D4E"}}>
                    {["Semana","Ganhos","Despesas","Investimentos","Saldo"].map(h=>(
                      <th key={h} style={{padding:"8px 12px",textAlign:h==="Semana"?"left":"right",color:"#7070A0",fontWeight:600}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {monthlyStats.weeklyData.map((row,i)=>(
                    <tr key={i} style={{borderBottom:"1px solid #1A1A2E"}}>
                      <td style={{padding:"8px 12px",color:"#C0C0E0"}}>{row.name}</td>
                      <td style={{padding:"8px 12px",textAlign:"right",color:GREEN}}>{fmt(row.Ganhos)}</td>
                      <td style={{padding:"8px 12px",textAlign:"right",color:RED}}>{fmt(row.Despesas)}</td>
                      <td style={{padding:"8px 12px",textAlign:"right",color:GOLD}}>{fmt(row.Investimentos)}</td>
                      <td style={{padding:"8px 12px",textAlign:"right",color:row.Saldo>=0?GREEN:RED,fontWeight:700}}>{fmt(row.Saldo)}</td>
                    </tr>
                  ))}
                  <tr style={{borderTop:"2px solid #3D3D6E",background:"#1A1A2E"}}>
                    <td style={{padding:"8px 12px",fontWeight:700,color:"#E0E0FF"}}>Total</td>
                    <td style={{padding:"8px 12px",textAlign:"right",color:GREEN,fontWeight:700}}>{fmt(monthlyStats.totalIncome)}</td>
                    <td style={{padding:"8px 12px",textAlign:"right",color:RED,fontWeight:700}}>{fmt(monthlyStats.totalExpense)}</td>
                    <td style={{padding:"8px 12px",textAlign:"right",color:GOLD,fontWeight:700}}>{fmt(monthlyStats.totalInvest)}</td>
                    <td style={{padding:"8px 12px",textAlign:"right",color:mBal>=0?GREEN:RED,fontWeight:700}}>{fmt(mBal)}</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </>)}

        {/* ===== ANUAL ===== */}
        {view==="ano" && (()=>{
          const totInc=yearStats.reduce((s,m)=>s+m.Ganhos,0);
          const totExp=yearStats.reduce((s,m)=>s+m.Despesas,0);
          const totInv=yearStats.reduce((s,m)=>s+m.Investimentos,0);
          const totBal=yearStats.reduce((s,m)=>s+m.Saldo,0);
          return (<>
            <div style={{color:"#A0A0C0",fontWeight:700,fontSize:18,marginBottom:16}}>🗓️ Visão Anual — {YEAR}</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(175px,1fr))",gap:12,marginBottom:20}}>
              <SummaryCard icon="💵" label="Total ganhos" value={fmt(totInc)} color={GREEN}/>
              <SummaryCard icon="💸" label="Total despesas" value={fmt(totExp)} color={RED}/>
              <SummaryCard icon="📈" label="Total investido" value={fmt(totInv)} color={GOLD}/>
              <SummaryCard icon="🏦" label="Saldo do ano" value={fmt(totBal)} color={totBal>=0?GREEN:RED} big/>
            </div>

            <div style={card}>
              <div style={{color:"#A0A0C0",fontWeight:700,marginBottom:12}}>📊 Ganhos e Despesas por mês</div>
              <ResponsiveContainer width="100%" height={250}>
                <BarChart data={yearStats} barSize={18}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#2D2D4E"/>
                  <XAxis dataKey="name" tick={{fill:"#7070A0",fontSize:11}}/>
                  <YAxis tick={{fill:"#7070A0",fontSize:10}} tickFormatter={v=>`€${(v/1000).toFixed(0)}k`}/>
                  <Tooltip formatter={v=>fmt(v)} contentStyle={ttStyle}/>
                  <Legend/>
                  <Bar dataKey="Ganhos" fill={GREEN} radius={[4,4,0,0]}/>
                  <Bar dataKey="Despesas" fill={RED} radius={[4,4,0,0]}/>
                  <Bar dataKey="Investimentos" fill={GOLD} radius={[4,4,0,0]}/>
                </BarChart>
              </ResponsiveContainer>
            </div>

            <div style={card}>
              <div style={{color:"#A0A0C0",fontWeight:700,marginBottom:12}}>📈 Saldo mensal ao longo do ano</div>
              <ResponsiveContainer width="100%" height={180}>
                <LineChart data={yearStats}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#2D2D4E"/>
                  <XAxis dataKey="name" tick={{fill:"#7070A0",fontSize:11}}/>
                  <YAxis tick={{fill:"#7070A0",fontSize:10}} tickFormatter={v=>fmt(v)}/>
                  <Tooltip formatter={v=>fmt(v)} contentStyle={ttStyle}/>
                  <Line type="monotone" dataKey="Saldo" stroke={PURPLE} strokeWidth={2.5} dot={{fill:PURPLE,r:4}}/>
                  <Line type="monotone" dataKey="Investimentos" stroke={GOLD} strokeWidth={2} strokeDasharray="4 2" dot={{fill:GOLD,r:3}}/>
                </LineChart>
              </ResponsiveContainer>
            </div>

            <div style={card}>
              <div style={{color:"#A0A0C0",fontWeight:700,marginBottom:12}}>📋 Resumo por mês</div>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                  <thead>
                    <tr style={{borderBottom:"1px solid #2D2D4E"}}>
                      {["Mês","Ganhos","Despesas","Investimentos","Saldo"].map(h=>(
                        <th key={h} style={{padding:"8px 12px",textAlign:h==="Mês"?"left":"right",color:"#7070A0",fontWeight:600}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {yearStats.map((row,i)=>(
                      <tr key={i} style={{borderBottom:"1px solid #1A1A2E",background:i%2===0?"transparent":"#12122A"}}>
                        <td style={{padding:"8px 12px",color:"#C0C0E0"}}>{MONTHS[i]}</td>
                        <td style={{padding:"8px 12px",textAlign:"right",color:GREEN}}>{fmt(row.Ganhos)}</td>
                        <td style={{padding:"8px 12px",textAlign:"right",color:RED}}>{fmt(row.Despesas)}</td>
                        <td style={{padding:"8px 12px",textAlign:"right",color:GOLD}}>{fmt(row.Investimentos)}</td>
                        <td style={{padding:"8px 12px",textAlign:"right",color:row.Saldo>=0?GREEN:RED,fontWeight:700}}>{fmt(row.Saldo)}</td>
                      </tr>
                    ))}
                    <tr style={{borderTop:"2px solid #3D3D6E",background:"#1A1A2E"}}>
                      <td style={{padding:"8px 12px",fontWeight:700,color:"#E0E0FF"}}>Total</td>
                      <td style={{padding:"8px 12px",textAlign:"right",color:GREEN,fontWeight:700}}>{fmt(totInc)}</td>
                      <td style={{padding:"8px 12px",textAlign:"right",color:RED,fontWeight:700}}>{fmt(totExp)}</td>
                      <td style={{padding:"8px 12px",textAlign:"right",color:GOLD,fontWeight:700}}>{fmt(totInv)}</td>
                      <td style={{padding:"8px 12px",textAlign:"right",color:totBal>=0?GREEN:RED,fontWeight:700}}>{fmt(totBal)}</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </>);
        })()}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
